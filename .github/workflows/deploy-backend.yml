name: Deploy Backend → Azure Container App

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docs-content/**'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository_owner }}/maindoc-backend

jobs:
  build-push:
    runs-on: ubuntu-latest
    name: Build & Push to GHCR
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Container App
    needs: build-push
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: MaIN
          containerAppName: maindoc-backend
          imageToDeploy: ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GHCR_PAT }}
