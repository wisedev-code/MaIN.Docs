<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#080810"/>
  <!-- Neural network nodes -->
  <!-- Left column -->
  <circle cx="7" cy="10" r="2.5" fill="#00ffcc"/>
  <circle cx="7" cy="22" r="2.5" fill="#00ffcc"/>
  <!-- Middle column -->
  <circle cx="16" cy="7" r="2.5" fill="#00c49a"/>
  <circle cx="16" cy="16" r="3" fill="#00ffcc"/>
  <circle cx="16" cy="25" r="2.5" fill="#00c49a"/>
  <!-- Right column -->
  <circle cx="25" cy="10" r="2.5" fill="#00ffcc"/>
  <circle cx="25" cy="22" r="2.5" fill="#00ffcc"/>
  <!-- Connections: left → middle -->
  <line x1="9.5" y1="10" x2="13.5" y2="8.5" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
  <line x1="9.5" y1="10" x2="13.2" y2="15" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
  <line x1="9.5" y1="10" x2="13.5" y2="23.5" stroke="#00ffcc" stroke-width="0.6" opacity="0.25"/>
  <line x1="9.5" y1="22" x2="13.5" y2="8.5" stroke="#00ffcc" stroke-width="0.6" opacity="0.25"/>
  <line x1="9.5" y1="22" x2="13.2" y2="15" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
  <line x1="9.5" y1="22" x2="13.5" y2="23.5" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
  <!-- Connections: middle → right -->
  <line x1="18.8" y1="15" x2="22.5" y2="10" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
  <line x1="18.5" y1="8.5" x2="22.5" y2="10" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
  <line x1="18.5" y1="23.5" x2="22.5" y2="22" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
  <line x1="18.8" y1="15" x2="22.5" y2="22" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
  <line x1="18.5" y1="8.5" x2="22.5" y2="22" stroke="#00ffcc" stroke-width="0.6" opacity="0.25"/>
  <line x1="18.5" y1="23.5" x2="22.5" y2="10" stroke="#00ffcc" stroke-width="0.6" opacity="0.25"/>
</svg>
