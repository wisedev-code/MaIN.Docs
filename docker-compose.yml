services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ApiKey=${API_KEY}
      - DocsContentPath=/docs-content
      - AllowedOrigins__0=http://localhost
      - MaIN__OllamaKey=${OLLAMA_KEY}
      - MaIN__OllamaBaseUrl=${OLLAMA_BASE_URL}
      - MaIN__OpenAiKey=${OPENAI_KEY}
    volumes:
      - ./docs-content:/docs-content:ro
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - API_KEY=${API_KEY}
    ports:
      - "80:80"
    depends_on:
      - backend
