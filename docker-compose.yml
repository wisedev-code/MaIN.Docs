services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ApiKey=${API_KEY}
      - DocsContentPath=/docs-content
      - AllowedOrigins__0=http://localhost:8070
      - MaIN__OllamaKey=${OLLAMA_KEY}
    volumes:
      - ./docs-content:/docs-content:ro
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - API_KEY=${API_KEY}
    ports:
      - "8070:80"
    depends_on:
      - backend
