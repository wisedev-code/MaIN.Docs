services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - SessionSecret=${SESSION_SECRET}
      - Turnstile__SecretKey=${TURNSTILE_SECRET_KEY}
      - DocsContentPath=/docs-content
      - AllowedOrigins__0=http://localhost:8070
      - AllowedOrigins__1=${ALLOWED_ORIGIN_AZURE_STATIC:-}
      - AllowedOrigins__2=${ALLOWED_ORIGIN_CUSTOM_DOMAIN:-}
      - Logging__LogLevel__Default=Information
      - Logging__LogLevel__Microsoft.AspNetCore=Warning
      - MaIN__GeminiKey=${GEMINI_KEY}
      - Capacity__Tier2__GeminiKey=${CAPACITY_TIER2_GEMINI_KEY}
      - Capacity__Tier3__OllamaKey=${CAPACITY_TIER3_OLLAMA_KEY}
      - Capacity__Tier3__OllamaKey2=${CAPACITY_TIER3_OLLAMA_KEY_2}
      - Capacity__Tier3__OllamaModel=${CAPACITY_TIER3_OLLAMA_MODEL:-gemma4:31b-cloud}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
    volumes:
      - ./docs-content:/docs-content:ro
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
    ports:
      - "8070:80"
    depends_on:
      - backend
